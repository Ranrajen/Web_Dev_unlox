<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Page</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
      }

      .hero {
        height: 500px;
        background-image: url('https://images.pexels.com/photos/302899/pexels-photo-302899.jpeg');
        background-size: cover;
        background-position: center;
        color: white;
        text-align: center;
        padding-top: 150px;
      }

      .hero h1 {
        font-size: 40px;
        text-shadow: 2px 2px 5px black;
      }

      .hero p {
        font-size: 20px;
      }

      .btn {
        background-color: brown;
        color: white;
        padding: 10px 20px;
        border: none;
        margin-top: 15px;
      }

      .content {
        text-align: center;
        padding: 20px;
        background-color: lightyellow;
      }
    </style>
  </head>

  <body>
    <div class="hero">
      <h1>Welcome to Coffee House</h1>
      <p>Enjoy the best coffee in town</p>
      <button class="btn">Order Now</button>
    </div>

    <div class="content">
      <h2>About Us</h2>
      <p>We serve fresh coffee with great taste and quality.</p>
    </div>
  </body>
</html>
