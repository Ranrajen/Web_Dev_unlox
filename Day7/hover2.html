<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #box {
        background-color: aqua;
        height: 150px;
        width: 200px;
        text-align: center;
      }

      #box:hover {
          transform: translateX(100px);
          transition: 1s;
          transform: rotate(360deg);
        transition: 2s;
        /* rotate with transition:   , scale  ; */
      }
    </style>
  </head>

  <body>
    <div id="box">
      <h2>RCB</h2>
      <h4>Rajat Patidar</h4>
    </div>
  </body>
</html>
