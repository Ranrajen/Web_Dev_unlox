<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    \
    <style>
      div {
        text-align: center;
        height: 250 px;
        width: 300px;
        background-color: wheat;
        color: blue;
      }

      /* hover */
      div:hover {
        background-color: aquamarine;
        transition: 1s;
      }

      /* p tag in div  */
      div p {
        color: red;
      }

      p {
        color: rgb(23, 137, 82);
      }
      ul li {
        display: inline;
        color: blue;
        list-style: none;
      }
    </style>
  </head>
  <body>
    <!-- change by mouse 
      -->

    <div>
      <h3>Virat Kohali</h3>
      <p>The Run Machine</p>
    </div>
    <p>The Greatest Of All Time</p>

    <ul>
      <li>Bat</li>
      <li>Ball</li>

      <li>Feilding</li>
    </ul>
  </body>
</html>
