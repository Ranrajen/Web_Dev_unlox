<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Selector </title>

<style>
/* select the class -- .className  */
.indoor{
    background-color: aqua;
}

.outdoor{
    background-color: rgb(140, 130, 174);       
}

/* inline csss > internal css > external css */
</style>


</head>
<body>
<h2 class="outdoor">Cycling </h2>
<p class="indoor">Ai automation</p>
<h4 class="outdoor">outdoor active </h4>
<h3 class="indoor">CSE Student </h3>
<p class="indoor">Hackathone preparation</p>
<p class="outdoor" style="background-color: blueviolet;">Music playlist </p>
    
</body>
</html>
