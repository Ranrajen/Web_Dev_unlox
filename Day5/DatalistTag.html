<!doctype html>
<html lang="en">
  <head>

    <title>Document</title>

  <body>
    <!-- upgraded version of SELECT Tag == shows the list of data  -- no need to close option tag -->

    <label>Choose Your Country </label>
    <input type="text"  list="County_uni_name" />

        <option value="Italy">
        <option value="Iran">
        <option value="Israel">
        <option value="Russia">
        <option value="China">

   <datalist  id="Food_uni_name">

        <option value="burger">
        <option value="biryani">
        <option value="paneer">
        <option value="Shai Paneer">
        <option value="kofta">
    </datalist>

  </body>
</html>
