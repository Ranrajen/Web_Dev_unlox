<!DOCTYPE html>
<html>
<head>
    <title>Card Design</title>
    <style>
        .card{
            width: 250px;
            border: 1px solid black;
            padding: 15px;
            text-align: center;
            background-color: lightgray;
            margin: auto;
        }

        h2{
            color: darkblue;
        }

        button{
            background-color: orange;
            color: white;
            padding: 8px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Java Course</h2>
        <p>Learn Java from basics</p>
        <button>Enroll Now</button>
    </div>

</body>
</html>
